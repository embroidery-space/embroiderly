[workspace]
resolver = "3"
members = ["app/src-tauri/", "crates/*"]

[workspace.package]
edition = "2024"

[profile.dev]
debug = "line-tables-only"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
debug = "limited"
strip = "debuginfo"
split-debuginfo = "packed"

[workspace.dependencies]
# Tauri
tauri = { version = "2.9.1", features = ["config-json5"] }
tauri-build = { version = "2.4.1", features = ["config-json5"] }
tauri-plugin = { version = "2.5.1", features = ["build"] }
## Official Tauri plugins
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-dialog = "2.4.2"
tauri-plugin-fs = "2.0.3"
tauri-plugin-opener = "2.5.2"
tauri-plugin-os = "2.3.2"
tauri-plugin-process = "2.3.1"
tauri-plugin-shell = "2.3.3"
tauri-plugin-updater = "2.9.0"
## Third-party Tauri plugins
tauri-plugin-prevent-default = "3.0.3"
tauri-plugin-pinia = "4.1.0"
## Custom Tauri plugins
tauri-plugin-log = { path = "crates/tauri-plugin-log" }
tauri-plugin-sentry = { path = "crates/tauri-plugin-sentry" }
tauri-plugin-posthog = { path = "crates/tauri-plugin-posthog" }

# Embroiderly Core
embroiderly_image = { path = "crates/embroiderly-image" }
embroiderly_parsers = { path = "crates/embroiderly-parsers" }
embroiderly_pattern = { path = "crates/embroiderly-pattern" }
embroiderly_logger = { path = "crates/embroiderly-logger" }
xsp_parsers = { path = "crates/xsp-parsers" }

# Parsing pattern files
byteorder = "1.5.0"
encoding_rs = "0.8.35"
hex = "0.4.3"
quick-xml = "0.38.3"

# Fonts handling
font-kit = "0.14.3"
ttf-parser = "0.25.1"

# Typst
typst = "0.14.0"
typst-pdf = "0.14.0"
## Third-party Typst libraries
typst-as-lib = "0.15.0"

# Image processing
image = "0.25.8"
quantette = "0.3.0"
palette = "0.7.6"

# Archiving
zip = { version = "6.0.0", features = [
  "zstd",
  "time",
], default-features = false }

# De/serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
base64 = "0.22.1"
borsh = { version = "1.5.7", features = ["derive"] }

# CLI
argh = { version = "0.1.13", default-features = false }

# Error handling
anyhow = "1.0.100"
thiserror = "2.0.17"

# Time handling
time = { version = "0.3.44", features = ["formatting", "macros"] }

# Logging
log = "0.4.28"
log-panics = { version = "2.1.0", features = ["with-backtrace"] }
fern = "0.7.1"

# Telemetry
sentry = "0.45.0"
posthog-rs = {version = "0.3.7", default-features = false }

# Identification
machine-uid = "0.5.3"
uuid = { version = "1.18.1", features = ["v4", "v7"] }

# File system utilities
tempfile = "3.23.0"
walkdir = "2.5.0"

# Iterator utilities
itertools = "0.14.0"
rayon = "1.11.0"

# Testing utilities
rstest = "0.26.1"

# Other
alphanumeric-sort = "1.5.3"
ordermap = "0.5.8"
ordered-float = "5.1.0"
dyn-clone = "1.0.20"
paste = "1.0.15"
prettydiff = { version = "0.9.0", default-features = false }
rand = "0.9.2"
sha2 = "0.10.9"
