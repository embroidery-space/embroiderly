name: Setup Rust
description: Sets up Rust toolchain with system dependencies and caching
inputs:
  with-nightly:
    description: Whether to install nightly toolchain
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Install system dependencies (Ubuntu-only)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      shell: bash
    - if: inputs.with-nightly == 'true'
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.89.0 # stable
    - uses: swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
    - uses: taiki-e/install-action@4575ae687efd0e2c78240087f26013fb2484987f # v2.62.6
      with:
        tool: cargo-nextest
