name: CodeQL Analysis
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    types: [opened, reopened, edited, synchronize]
  schedule:
    - cron: "0 12 * * 1" # Run at 12:00 UTC every Monday
permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write
concurrency:
  group: ${{ github.ref }}-codeql
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  prepare:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'dependabot/') == false
      && github.head_ref != 'dependency-updates'
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check for file changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            actions:
              - '.github/workflows/**'
              - '.github/actions/**'
            javascript:
              - '**/*.{js,ts,vue}'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
      - name: Build Dynamic Matrix
        id: build-matrix
        run: |
          # If this is our weekly schedule, force-run all languages.
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo 'matrix=[{"language":"actions","build-mode":"none"},{"language":"javascript-typescript","build-mode":"none"},{"language":"rust","build-mode":"none"}]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Otherwise, construct the matrix based on what changed.
          MATRIX=""
          [ "${{ steps.changes.outputs.actions }}" == "true" ] && MATRIX+='{"language":"actions","build-mode":"none"},'
          [ "${{ steps.changes.outputs.javascript }}" == "true" ] && MATRIX+='{"language":"javascript-typescript","build-mode":"none"},'
          [ "${{ steps.changes.outputs.rust }}" == "true" ] && MATRIX+='{"language":"rust","build-mode":"none"},'

          # Remove the trailing comma and construct the array.
          MATRIX="[${MATRIX%,}]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
  analyze:
    needs: prepare
    if: ${{ needs.prepare.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: +security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
