name: CI (backend)
on:
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, edited, synchronize]
    paths:
      - ".config/**"
      - "app/src-tauri/**"
      - "crates/**"
      - "Cargo.*"
      - rustfmt.toml
      - .github/workflows/ci.backend.yml
permissions:
  contents: read
concurrency:
  group: ${{ github.ref }}-backend
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-rust
        with:
          stable-components: clippy
          nightly-components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --check
      - name: Check linting
        run: cargo clippy --locked -- -D warnings
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-rust
        with:
          nightly-components: llvm-tools-preview
          tools: cargo-nextest,cargo-llvm-cov
      - name: Test
        run: cargo +nightly llvm-cov nextest --locked -F embroiderly/test --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        if: matrix.platform == 'ubuntu-latest'
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          flags: backend
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
