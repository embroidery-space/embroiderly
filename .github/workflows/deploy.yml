name: Deploy
on:
  push:
    branches-ignore: ["dependabot/**", dependency-updates]
    paths:
      - "app/**"
      - "crates/**"
      - "packages/**"
      - "Cargo.*"
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy.yml
permissions:
  contents: read
  deployments: write
env:
  CARGO_TERM_COLOR: always
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      # Branches whose deployments are long-lived.
      # Anything else is treated as a short-lived preview and ships without PWA so users' disks aren't filled by service-worker caches for URLs they'll never revisit.
      LONG_LIVED_BRANCHES: '["main", "dev"]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          tools: wasm-pack

      - name: Build web app
        env:
          VITE_EMBROIDERLY_POSTHOG_API_KEY: ${{ github.ref_name == 'main' && secrets.EMBROIDERLY_POSTHOG_API_KEY || '' }}
          VITE_EMBROIDERLY_SENTRY_DSN: ${{ github.ref_name == 'main' && secrets.EMBROIDERLY_SENTRY_DSN || '' }}
          EMBROIDERLY_PWA: ${{ contains(fromJSON(env.LONG_LIVED_BRANCHES), github.ref_name) }}
        run: pnpm app:build

      - name: Upload source maps to Sentry
        if: github.ref_name == 'main'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: embroidery-space
          SENTRY_PROJECT: embroiderly
        run: |
          pnpm install -g @sentry/cli

          APP_VERSION=$(node -p "require('./app/package.json').version")

          sentry-cli releases new "embroiderly@$APP_VERSION"
          sentry-cli releases set-commits "embroiderly@$APP_VERSION" --auto || true

          sentry-cli sourcemaps inject ./app/dist
          sentry-cli sourcemaps upload --release="embroiderly@$APP_VERSION" ./app/dist

          sentry-cli releases finalize "embroiderly@$APP_VERSION"

      - name: Remove source maps before deploy
        run: find app/dist/ -name "*.map" -delete

      - name: Determine Wrangler Command
        id: info
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Extract the first line and escape backslashes and double quotes.
          CLEAN_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/\\/\\\\/g; s/"/\\"/g')

          if [ "${{ github.ref_name }}" = "main" ]; then
            # Live production.
            echo "cmd=deploy --message \"$CLEAN_MSG\"" >> $GITHUB_OUTPUT
            echo "alias=" >> $GITHUB_OUTPUT
          else
            # Sanitize branch name for the alias: replace `/` with `-` and lowercase it.
            alias=$(echo "${{ github.ref_name }}" | sed 's/[\/\.]/-/g' | tr '[:upper:]' '[:lower:]')

            # Commit and branch preview.
            echo "cmd=versions upload --preview-alias $alias --message \"$CLEAN_MSG\"" >> $GITHUB_OUTPUT
            echo "alias=$alias" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: ${{ steps.info.outputs.cmd }}
          packageManager: pnpm
          workingDirectory: app/

      - name: Generate Summary
        run: |
          {
            echo "## Embroiderly deployment on Cloudflare"
            echo "**Preview URL:** <${{ steps.deploy.outputs.deployment-url }}>."
          } >> $GITHUB_STEP_SUMMARY

      - name: Publish a post in Embroiderly Logs
        env:
          LOGS_URL: ${{ vars.EMBROIDERLY_LOGS_URL }}
          LOGS_SECRET: ${{ secrets.EMBROIDERLY_LOGS_SECRET }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_HASH: ${{ github.sha }}
          COMMIT_BRANCH: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS: ${{ steps.info.outputs.alias }}
        run: |
          GIT_INFO=$(jq -cn \
            --arg u "$COMMIT_URL" --arg h "$COMMIT_HASH" --arg b "$COMMIT_BRANCH" --arg m "$(echo "$COMMIT_MESSAGE" | head -1)" \
            '{ url: $u, hash: $h, branch: $b, message: $m }')

          if [ -n "$ALIAS" ]; then
            # Derive the base hostname from the preview URL by stripping the UUID prefix, then substitute the branch alias to build the alias URL.
            BASE=$(echo "$PREVIEW_URL" | sed 's|https://[^-]*-||')
            ALIAS_URL="https://${ALIAS}-${BASE}"

            BODY=$(jq -cn \
              --argjson gi "$GIT_INFO" --arg p "$PREVIEW_URL" --arg a "$ALIAS_URL" \
              '{ gitInfo: $gi, previewUrl: $p, aliasUrl: $a }')
          else
            BODY=$(jq -cn \
              --argjson gi "$GIT_INFO" --arg p "$PREVIEW_URL" \
              '{ gitInfo: $gi, previewUrl: $p }')
          fi

          curl --fail-with-body -sS \
            -X POST "$LOGS_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $LOGS_SECRET" \
            -d "$BODY"
