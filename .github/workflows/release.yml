name: Release
on:
  # Push to main: builds the desktop app and publishes a GitHub release.
  push:
    branches: [main]
  # PR to main: only validates the build without publishing.
  pull_request:
    branches: [main]
    types: [opened, reopened, edited, synchronize]
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-rust
        with:
          tools: typst-cli

      - name: Build the application
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Empty tagName/releaseName skips release creation (PR builds).
          tagName: ${{ github.event_name == 'push' && 'v__VERSION__' || '' }}
          releaseName: ${{ github.event_name == 'push' && 'Embroiderly v__VERSION__' || '' }}
          releaseBody: "Changelog: <https://docs.embroiderly.niusia.me/resources/changelog/v__VERSION__>."
          args: ${{  matrix.platform == 'ubuntu-latest' && '--features cef' || '' }}
          updaterJsonPreferNsis: true
